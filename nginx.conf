# Alisu — nginx config for DigitalOcean
# Place at /etc/nginx/sites-available/alisu and symlink to sites-enabled/
#
# Replace YOUR_DOMAIN with your actual domain (or Droplet IP for testing)
# Run: sudo certbot --nginx -d YOUR_DOMAIN  (after pointing DNS)

upstream alisu_backend {
    server 127.0.0.1:3000;
    keepalive 16;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Dashboard static files
    root /var/www/alisu;
    index index.html;

    # ── API routes — strip /api prefix, proxy to Node ────────────────────────
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://alisu_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Dashboard WebSocket ───────────────────────────────────────────────────
    location /dashboard-ws {
        proxy_pass         http://alisu_backend/dashboard-ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── Twilio media stream WebSocket ─────────────────────────────────────────
    location /media-stream {
        proxy_pass         http://alisu_backend/media-stream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── Twilio voice webhooks (no prefix strip) ───────────────────────────────
    location ~ ^/(incoming-call|handle-confirm|voice-token) {
        proxy_pass         http://alisu_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://alisu_backend/health;
    }

    # ── SPA fallback — serve index.html for all unknown paths ────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options        DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy        strict-origin-when-cross-origin;
}
